<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Кубодрайв</title>
    <style>
        /* ПРАВИЛО 3: МОБИЛЬНАЯ АДАПТАЦИЯ И БЛОКИРОВКА СКРОЛЛА */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
            overscroll-behavior: none;
            position: fixed;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        
        #menuLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 30, 40, 0.6);
            backdrop-filter: blur(2px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }

        #winLayer, #pauseLayer, #shopLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 40, 50, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20;
            backdrop-filter: blur(3px); 
            transition: opacity 0.3s;
        }

        #shopLayer {
            z-index: 25;
            background: rgba(20, 25, 30, 0.95);
        }
        
        #menuLayer h1 {
            color: #FFD700; font-size: 55px; text-shadow: 4px 4px 0 #d35400, 0 0 20px rgba(241, 196, 15, 0.5); margin-bottom: 40px;
            letter-spacing: 2px; text-align: center; line-height: 1.1;
        }
        
        #langSelector {
            display: flex; gap: 15px; margin-bottom: 20px;
        }
        .lang-btn {
            background: #34495e; color: #FFF; border: 2px solid #2c3e50;
            font-size: 18px; font-weight: bold; padding: 10px 15px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 0 #1a252f;
        }
        .lang-btn.active { 
            border-color: #f1c40f; background: #f39c12; color: #000;
            transform: translateY(2px); box-shadow: 0 2px 0 #d35400; 
        }
        
        @keyframes pulseStart {
            0% { transform: scale(1); box-shadow: 0 8px 0 #bf6f1a; }
            50% { transform: scale(1.03); box-shadow: 0 8px 0 #bf6f1a; }
            100% { transform: scale(1); box-shadow: 0 8px 0 #bf6f1a; }
        }
        #mainStartBtn {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: white; border: 2px solid #f39c12;
            border-radius: 12px; padding: 25px 50px; font-size: 32px; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #bf6f1a; transition: all 0.1s;
            margin-bottom: 20px; text-shadow: 2px 2px 0 #a35d14;
            animation: pulseStart 2s infinite ease-in-out;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #mainStartBtn:active { transform: translateY(8px) scale(0.98); box-shadow: 0 0px 0 #bf6f1a; animation: none; }

        #endlessModeBtn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white; border: 2px solid #c0392b;
            border-radius: 12px; padding: 15px 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 0 #922b21; transition: all 0.1s;
            margin-bottom: 20px; text-shadow: 1px 1px 0 #641e16;
            text-transform: uppercase; letter-spacing: 1px;
            display: none; 
        }
        #endlessModeBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #922b21; }
        #endlessModeBtn:active { transform: translateY(6px); box-shadow: 0 0px 0 #922b21; }

        #openShopBtn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; border: 2px solid #2980b9;
            border-radius: 12px; padding: 15px 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 0 #1c5982; transition: all 0.1s;
            margin-bottom: 20px; text-shadow: 1px 1px 0 #154360;
            text-transform: uppercase; letter-spacing: 1px;
            display: none; 
        }
        #openShopBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #1c5982; }
        #openShopBtn:active { transform: translateY(6px); box-shadow: 0 0px 0 #1c5982; }

        #reviewBtnMenu {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white; border: 2px solid #16a085;
            border-radius: 12px; padding: 15px 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 0 #0e6655; transition: all 0.1s;
            margin-bottom: 20px; text-shadow: 1px 1px 0 #0b5345; text-transform: uppercase;
            display: none; 
        }
        #reviewBtnMenu:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #0e6655; }
        #reviewBtnMenu:active { transform: translateY(6px); box-shadow: 0 0px 0 #0e6655; }

        #moreGamesBtn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white; border: 2px solid #9b59b6;
            border-radius: 12px; padding: 15px 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 0 #5e336e; transition: all 0.1s;
            margin-bottom: 40px; text-shadow: 1px 1px 0 #3a1e45;
            text-transform: uppercase; letter-spacing: 1px;
            display: none; 
        }
        #moreGamesBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #5e336e; }
        #moreGamesBtn:active { transform: translateY(6px); box-shadow: 0 0px 0 #5e336e; }

        .global-sound-btn {
            background: transparent; border: none; font-size: 30px; cursor: pointer; 
            text-shadow: 2px 2px 0 #000; position: absolute; top: 20px; left: 20px; z-index: 50;
            transition: transform 0.1s;
        }
        .global-sound-btn:active { transform: scale(0.9); }

        #inGameUI {
            position: absolute; top: 15px; right: 20px; z-index: 5; pointer-events: none;
            display: flex; align-items: center; gap: 15px;
        }
        #crystalCount { 
            color: #81ecec; text-shadow: 2px 2px 0 #000; 
            font-size: 32px; font-weight: bold; margin: 0;
        }
        
        .ui-square-btn {
            pointer-events: auto; background: rgba(44, 62, 80, 0.8); 
            color: white; border: 2px solid #bdc3c7;
            width: 50px; height: 50px; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 0 #2c3e50; transition: transform 0.1s; margin: 0;
        }
        .ui-square-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #2c3e50; }

        .overlay-title { color: #00b894; font-size: 55px; text-shadow: 4px 4px 0 #006266; margin-bottom: 20px; text-align: center; }
        #winDiamonds { color: #81ecec; font-size: 40px; font-weight: bold; margin-bottom: 20px; text-shadow: 3px 3px 0 #000; text-align: center;}
        
        #reviewPromptContainer {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: none; 
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #reviewPromptText {
            color: #FFF; font-size: 20px; font-weight: bold; text-align: center; text-shadow: 1px 1px 2px #000; margin: 0;
        }

        .btn-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
        .win-btn {
            padding: 18px 35px; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); color: white; transition: transform 0.1s; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .win-btn:active { transform: translateY(6px); }
        
        .btn-blue { background: linear-gradient(to bottom, #0984e3, #0652DD); box-shadow: 0 6px 0 #003055; }
        .btn-blue:active { box-shadow: 0 0px 0 #003055; }
        
        .btn-yellow { background: linear-gradient(to bottom, #fdcb6e, #e17055); color: #2d3436; box-shadow: 0 6px 0 #d63031; text-shadow: none; border-color: #ffeaa7;}
        .btn-yellow:active { box-shadow: 0 0px 0 #d63031; }

        .btn-green { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 6px 0 #16a085; }
        .btn-green:active { box-shadow: 0 0 0 #16a085; }

        .btn-red { background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 6px 0 #922b21; }
        .btn-red:active { box-shadow: 0 0 0 #922b21; }

        /* СТИЛИ МАГАЗИНА */
        #shopContainer {
            width: 90%; max-width: 800px;
            background: rgba(44, 62, 80, 0.9);
            border-radius: 20px;
            border: 4px solid #f1c40f;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }
        .shop-header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px;
        }
        .shop-header h2 { margin: 0; color: #f1c40f; font-size: 32px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; }
        .shop-balance { color: #81ecec; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        
        #shopItems {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
            width: 100%; overflow-y: auto; max-height: 50vh; padding: 10px 0;
        }
        
        .skin-card {
            background: #34495e; border: 3px solid #2c3e50; border-radius: 15px;
            width: 160px; padding: 15px; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s;
        }
        .skin-card:hover { transform: translateY(-5px); }
        .skin-card.equipped { border-color: #2ecc71; background: #27ae60; }
        .skin-card.owned { border-color: #f1c40f; }
        
        .skin-preview {
            width: 80px; height: 80px; background: rgba(0,0,0,0.2); border-radius: 10px;
            margin-bottom: 15px; display: flex; justify-content: center; align-items: center;
        }
        .skin-preview img { width: 60px; height: 60px; image-rendering: pixelated; }
        
        .skin-name { color: white; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 16px; height: 40px; display: flex; align-items: center; }
        
        .skin-btn {
            width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
            border: none; transition: background 0.2s; text-transform: uppercase; font-size: 14px;
        }
        .btn-buy { background: #f1c40f; color: #000; box-shadow: 0 4px 0 #d35400; }
        .btn-buy:active { transform: translateY(4px); box-shadow: 0 0 0 #d35400; }
        .btn-buy:disabled { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; color: #ecf0f1; cursor: not-allowed; }
        .btn-equip { background: #3498db; color: #FFF; box-shadow: 0 4px 0 #2980b9; }
        .btn-equip:active { transform: translateY(4px); box-shadow: 0 0 0 #2980b9; }
        .btn-equipped { background: #2ecc71; color: #FFF; box-shadow: 0 4px 0 #27ae60; cursor: default; }

        .fade-element { transition: opacity 0.8s ease-out; opacity: 0; }

        /* ИСПРАВЛЕНИЕ АДАПТАЦИИ ДЛЯ ЛАНДШАФТА НА МОБИЛЬНЫХ (Маленькая высота) */
        @media screen and (max-height: 500px) {
            #menuLayer h1 { font-size: 40px; margin-bottom: 15px; }
            #mainStartBtn { font-size: 20px; padding: 12px 25px; margin-bottom: 10px; }
            #endlessModeBtn, #openShopBtn { font-size: 16px; padding: 10px 20px; margin-bottom: 10px; }
            #reviewBtnMenu, #moreGamesBtn { font-size: 14px; padding: 8px 15px; margin-bottom: 10px; }
            .lang-btn { font-size: 14px; padding: 5px 10px; }
            .global-sound-btn { font-size: 24px; top: 10px; left: 15px; }
            
            .overlay-title { font-size: 35px; margin-bottom: 10px;}
            #winDiamonds { font-size: 24px; margin-bottom: 10px;}
            .win-btn { font-size: 16px; padding: 12px 20px; width: auto; min-width: 150px; margin-bottom: 5px;}
            .btn-container { flex-direction: row; width: 100%; align-items: center;}
            
            #inGameUI { top: 10px; right: 15px; gap: 10px; }
            #crystalCount { font-size: 24px; }
            .ui-square-btn { width: 40px; height: 40px; font-size: 18px; border-radius: 8px;}
            
            #shopContainer { padding: 10px; }
            .shop-header h2 { font-size: 20px; }
            .shop-balance { font-size: 18px; }
            .skin-card { width: 110px; padding: 10px; }
            .skin-preview { width: 50px; height: 50px; margin-bottom: 5px; }
            .skin-preview img { width: 35px; height: 35px; }
            .skin-name { font-size: 12px; margin-bottom: 5px; height: 30px;}
            .skin-btn { font-size: 12px; padding: 6px; }
        }
    </style>

    function drawSkin(ctxTarget, skinId, size) {
        ctxTarget.save();

        if (skinId === 4) {
            ctxTarget.fillStyle = '#ecf0f1';
            ctxTarget.beginPath();
            ctxTarget.moveTo(-size/2 + 5, -size/4); ctxTarget.lineTo(-size/2 - 15, -size/2); ctxTarget.lineTo(-size/2 - 10, 0); ctxTarget.fill();
            ctxTarget.beginPath();
            ctxTarget.moveTo(size/2 - 5, -size/4); ctxTarget.lineTo(size/2 + 15, -size/2); ctxTarget.lineTo(size/2 + 10, 0); ctxTarget.fill();
        }

        let baseColor = '#FFD700'; let strokeColor = '#e67e22';
        if (skinId === 1) { baseColor = '#9b59b6'; strokeColor = '#8e44ad'; } 
        if (skinId === 2) { baseColor = '#ecf0f1'; strokeColor = '#bdc3c7'; } 
        if (skinId === 3) { baseColor = '#ffffff'; strokeColor = '#7f8c8d'; } 
        if (skinId === 4) { baseColor = '#3498db'; strokeColor = '#2980b9'; } 
        if (skinId === 5) { baseColor = '#f39c12'; strokeColor = '#d35400'; } 

        ctxTarget.fillStyle = baseColor; 
        ctxTarget.beginPath(); ctxTarget.roundRect(-size/2, -size/2, size, size, 8); ctxTarget.fill(); 
        
        if (skinId === 2) { 
            ctxTarget.fillStyle = '#e74c3c';
            ctxTarget.beginPath(); ctxTarget.arc(-size/4, -size/4, 4, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(size/4, -size/4, 4, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(-size/4, size/4, 4, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(size/4, size/4, 4, 0, Math.PI*2); ctxTarget.fill();
        } 
        else if (skinId === 3) { 
            ctxTarget.fillStyle = '#2c3e50';
            ctxTarget.fillRect(-size/2 + 5, -size/2 + 2, 4, size - 4);
            ctxTarget.fillRect(-size/2 + 15, -size/2 + 2, 5, size - 4);
            ctxTarget.fillRect(-size/2 + 25, -size/2 + 2, 4, size - 4);
        }
        else if (skinId === 5) { 
            ctxTarget.fillStyle = '#8B4513';
            ctxTarget.beginPath(); ctxTarget.arc(-10, -10, 7, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(10, 5, 8, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(-5, 12, 5, 0, Math.PI*2); ctxTarget.fill();
            ctxTarget.beginPath(); ctxTarget.arc(12, -12, 4, 0, Math.PI*2); ctxTarget.fill();
        }

        ctxTarget.fillStyle = '#FFF'; 
        ctxTarget.beginPath(); ctxTarget.arc(5, -8, 6, 0, Math.PI * 2); ctxTarget.arc(15, -8, 6, 0, Math.PI * 2); ctxTarget.fill();
        ctxTarget.fillStyle = '#000'; 
        ctxTarget.beginPath(); ctxTarget.arc(7, -8, 2, 0, Math.PI * 2); ctxTarget.arc(17, -8, 2, 0, Math.PI * 2); ctxTarget.fill();
        ctxTarget.beginPath(); ctxTarget.arc(10, 5, 6, 0, Math.PI); ctxTarget.stroke();
        ctxTarget.restore();
    }

    function generateSkinPreviewDataURL(skinId) {
        let tempCanvas = document.createElement('canvas'); tempCanvas.width = 60; tempCanvas.height = 60;
        let tCtx = tempCanvas.getContext('2d'); tCtx.translate(30, 30); drawSkin(tCtx, skinId, 40);
        return tempCanvas.toDataURL();
    }

    document.getElementById('mainStartBtn').onclick = () => { 
        if (!isMuted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
        
        if (savedLevel === 0) {
            startCutscene('intro');
        } else if (savedLevel > 10) {
            savedLevel = 0; saveProgress(); startCutscene('intro'); 
        } else {
            startLevel(savedLevel);
        }
    };
    
    document.getElementById('endlessModeBtn').onclick = () => { if (!isMuted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); startLevel('endless'); };
    document.getElementById('openShopBtn').onclick = () => { if (!isMuted && audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); openShop(); };
    
    document.getElementById('btnReviewYes').onclick = () => {
        if (ysdk && ysdk.feedback) {
            ysdk.feedback.requestReview().then(({ feedbackSent }) => {
                document.getElementById('reviewPromptContainer').style.display = 'none';
            }).catch(() => document.getElementById('reviewPromptContainer').style.display = 'none');
        }
    };
    document.getElementById('btnReviewNo').onclick = () => { document.getElementById('reviewPromptContainer').style.display = 'none'; };

    document.getElementById('mobilePauseBtn').onclick = (e) => { 
        e.stopPropagation(); 
        if (gameState === 'PLAYING') { 
            gameState = 'PAUSED'; pauseLayer.style.display = 'flex'; inGameUI.style.display = 'none'; 
        } 
    };
    document.getElementById('resumeBtn').onclick = () => { gameState = 'PLAYING'; pauseLayer.style.display = 'none'; inGameUI.style.display = 'flex'; lastTime = performance.now(); };
    document.getElementById('exitMenuBtn').onclick = () => { pauseLayer.style.display = 'none'; goToMenu(); };
    document.getElementById('closeShopBtn').onclick = () => { shopLayer.style.display = 'none'; goToMenu(); };

    function openShop() { gameState = 'SHOP'; menuLayer.style.display = 'none'; winLayer.style.display = 'none'; pauseLayer.style.display = 'none'; inGameUI.style.display = 'none'; shopLayer.style.display = 'flex'; renderShop(); }

    function renderShop() {
        let shopItemsDiv = document.getElementById('shopItems'); shopItemsDiv.innerHTML = '';
        document.getElementById('shopBalanceDisplay').innerText = `💎 ${score}`;
        let t = translations[currentLang];
        SKIN_DATA.forEach(skin => {
            let isOwned = ownedSkins.includes(skin.id); let isEquipped = equippedSkin === skin.id;
            let card = document.createElement('div'); card.className = `skin-card ${isEquipped ? 'equipped' : ''} ${isOwned ? 'owned' : ''}`;
            let previewUrl = generateSkinPreviewDataURL(skin.id);
            let html = `<div class="skin-preview"><img src="${previewUrl}" alt="Skin"></div><div class="skin-name">${t.skins[skin.id]}</div>`;
            card.innerHTML = html; 
            let btn = document.createElement('button');
            if (isEquipped) { btn.className = 'skin-btn btn-equipped'; btn.innerText = t.btnEquipped; } 
            else if (isOwned) { btn.className = 'skin-btn btn-equip'; btn.innerText = t.btnEquip; btn.onclick = () => equipSkin(skin.id); } 
            else { btn.className = 'skin-btn btn-buy'; btn.innerText = `${t.btnBuy} (💎 ${skin.price})`; if (score < skin.price) btn.disabled = true; btn.onclick = () => buySkin(skin.id, skin.price); }
            card.appendChild(btn); shopItemsDiv.appendChild(card);
        });
    }

    function buySkin(id, price) {
        if (score >= price && !ownedSkins.includes(id)) { score -= price; ownedSkins.push(id); playSfxBuy(); equipSkin(id); renderShop(); updateScoreDisplay(); }
    }

    function equipSkin(id) { equippedSkin = id; saveProgress(); renderShop(); }

    document.getElementById('btnNextLevel').onclick = () => {
        winLayer.style.display = 'none'; score += levelScore; levelScore = 0;
        
        if (isEndlessMode) { goToMenu(); return; }

        let nextLvl = currentLevelIndex + 1;
        if (nextLvl > savedLevel) {
            savedLevel = nextLvl;
        }
        saveProgress();

        showInterstitialAd(() => {
            if (currentLevelIndex === 3 && !hasSeenShopCutscene) { 
                shopUnlocked = true; saveProgress(); startCutscene('shop'); 
            } else { 
                startLevel(currentLevelIndex + 1); 
            }
        });
    };

    const player = {

            this.angle += (this.targetAngle - this.angle) * 0.15 * dt;
            this.x += this.dx * dt; this.dy += GRAVITY * dt; this.y += this.dy * dt;
            trailParticles.push({ x: this.x + this.size / 2, y: this.y + this.size / 2, size: 15, alpha: 0.7, color: '#f39c12' });

                let objActualY = obj.type === 'saw' ? floorY - obj.y : floorY - obj.y - (obj.h || 0); 

                if (obj.type === 'finish') {
                    if (this.x + this.size > obj.x && gameState === 'PLAYING') { gameState = 'WIN_ANIMATION'; winBeamX = obj.x + obj.w / 2; this.x = winBeamX - this.size / 2; this.dx = 0; this.dy = 0; } continue;

                        finaleBlackAlpha = 0; finaleWhiteAlpha = 0; finaleFriends = [];
                    }
                    continue;

                if (obj.type === 'saw') {
                    if (obj.angle === undefined) { obj.angle = 0; obj.startX = obj.x; obj.dir = 1; obj.moveRange = obj.moveRange !== undefined ? obj.moveRange : 60; obj.moveSpeed = obj.moveSpeed !== undefined ? obj.moveSpeed : 1.5; }
                    obj.angle += 0.1 * dt;

                        obj.x += obj.moveSpeed * obj.dir * dt;
                        if (obj.x >= obj.startX + obj.moveRange) { obj.x = obj.startX + obj.moveRange; obj.dir = -1; } else if (obj.x <= obj.startX - obj.moveRange) { obj.x = obj.startX - obj.moveRange; obj.dir = 1; }
                    }

                }

    function drawSpeechBubbleAnimated(fullText, currentText, bubbleX, bubbleY, bubbleWidth, tailTargetX, tailTargetY, scale) {
        let fontSize = canvas.height < 500 ? 16 : 22;
        ctx.save(); ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`; 
        let textPadding = canvas.height < 500 ? 15 : 25; 
        let lineHeight = fontSize * 1.4;
        
        let words = fullText.split(' '); let line = ''; let lines = [];
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (ctx.measureText(testLine).width > bubbleWidth - textPadding * 2 && n > 0) { lines.push(line); line = words[n] + ' '; } else { line = testLine; }
        }
        lines.push(line); 
        let bubbleHeight = lines.length * lineHeight + textPadding * 2 + (canvas.height < 500 ? 20 : 30);
        
        if (bubbleY - bubbleHeight < 10) {
            bubbleY = bubbleHeight + 10;
        }

        ctx.translate(tailTargetX, tailTargetY); ctx.scale(scale, scale); ctx.translate(-tailTargetX, -tailTargetY);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.beginPath(); ctx.roundRect(bubbleX, bubbleY - bubbleHeight + 10, bubbleWidth, bubbleHeight, 20); ctx.fill();
        let rectY = bubbleY - bubbleHeight;
        ctx.fillStyle = '#fdfbf7'; ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 5; ctx.beginPath(); ctx.roundRect(bubbleX, rectY, bubbleWidth, bubbleHeight, 20); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bubbleX + 40, bubbleY); ctx.lineTo(tailTargetX, tailTargetY); ctx.lineTo(bubbleX + 70, bubbleY); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.roundRect(bubbleX, rectY, bubbleWidth, bubbleHeight, 20); ctx.moveTo(bubbleX + 40, bubbleY); ctx.lineTo(tailTargetX, tailTargetY); ctx.lineTo(bubbleX + 70, bubbleY); ctx.stroke();
        ctx.fillStyle = '#fdfbf7'; ctx.beginPath(); ctx.moveTo(bubbleX + 43, bubbleY - 3); ctx.lineTo(tailTargetX, tailTargetY - 2); ctx.lineTo(bubbleX + 67, bubbleY - 3); ctx.fill();

        ctx.fillStyle = '#2c3e50'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        let charsRemaining = currentText.length;
        for (let i = 0; i < lines.length; i++) {
            if (charsRemaining <= 0) break; let lineString = lines[i];
            if (charsRemaining < lineString.length) { ctx.fillText(lineString.substring(0, charsRemaining), bubbleX + textPadding, rectY + textPadding + i * lineHeight); charsRemaining = 0; } 
            else { ctx.fillText(lineString, bubbleX + textPadding, rectY + textPadding + i * lineHeight); charsRemaining -= lineString.length; }
        }
        
        if (currentText.length === fullText.length) {
            ctx.fillStyle = '#7f8c8d'; ctx.font = `italic ${canvas.height < 500 ? 12 : 16}px "Segoe UI", sans-serif`; ctx.textAlign = 'right';
            let pulse = Math.abs(Math.sin(performance.now() / 300)); ctx.globalAlpha = 0.5 + 0.5 * pulse;
            ctx.fillText(translations[currentLang].clickNext, bubbleX + bubbleWidth - 20, bubbleY - 20); ctx.globalAlpha = 1.0;
        }
        ctx.restore();
    }

    function drawBeautifulClouds(parallax, baseOffsetY, scaleMult, opacity, isNightMode) {
        let camOffset = cameraX * parallax; let spacing = 600; 
        let startChunk = Math.floor(camOffset / spacing) - 1; let endChunk = startChunk + Math.ceil(canvas.width / spacing) + 2;

        for (let i = startChunk; i <= endChunk; i++) {
            let r1 = Math.abs(Math.sin(i * 12.9898) * 43758.5453 % 1); let r2 = Math.abs(Math.sin(i * 78.233) * 43758.5453 % 1); let r3 = Math.abs(Math.sin(i * 45.123) * 43758.5453 % 1);
            let drawX = (i * spacing) - camOffset + (r1 * 300); let drawY = baseOffsetY + (r2 * 100) - 50; let scale = scaleMult * (0.7 + r3 * 0.6);

            ctx.save(); ctx.translate(drawX, drawY); ctx.scale(scale, scale);
            let grad = ctx.createLinearGradient(0, -45, 0, 30);
            if (isNightMode) { grad.addColorStop(0, `rgba(44, 62, 80, ${opacity})`); grad.addColorStop(1, `rgba(26, 37, 47, ${opacity * 0.9})`); } 
            else { grad.addColorStop(0, `rgba(255, 255, 255, ${opacity})`); grad.addColorStop(1, `rgba(200, 220, 240, ${opacity * 0.9})`); }
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.arc(45, -20, 50, 0, Math.PI * 2); ctx.arc(95, -5, 40, 0, Math.PI * 2); ctx.arc(50, 15, 35, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }
    }

    function drawBackground() {
        let floorY = canvas.height - 50;
        let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        if (isNight) { skyGrad.addColorStop(0, '#0f0c29'); skyGrad.addColorStop(1, '#302b63'); } else { skyGrad.addColorStop(0, '#74b9ff'); skyGrad.addColorStop(1, '#E0F6FF'); }
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (isNight) {
            ctx.fillStyle = '#FFF';
            stars.forEach(s => {
                s.alpha += s.pulse * s.dir; if(s.alpha > 1) { s.alpha = 1; s.dir = -1; } if(s.alpha < 0.2) { s.alpha = 0.2; s.dir = 1; }
                ctx.globalAlpha = s.alpha; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            }); ctx.globalAlpha = 1.0;
        }

        let celestialX = canvas.width * 0.8; let celestialY = 150;
        ctx.save();
        if (isNight) {
            ctx.fillStyle = 'rgba(241, 196, 15, 0.4)'; ctx.beginPath(); ctx.arc(celestialX, celestialY, 100, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(celestialX, celestialY, 45, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1e1a40'; ctx.beginPath(); ctx.arc(celestialX - 15, celestialY - 10, 40, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle = 'rgba(243, 156, 18, 0.5)'; ctx.beginPath(); ctx.arc(celestialX, celestialY, 120, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(celestialX, celestialY, 50, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        let farCam = cameraX * 0.05; let farGrad = ctx.createLinearGradient(0, floorY - 400, 0, floorY);
        if (isNight) { farGrad.addColorStop(0, '#1c1635'); farGrad.addColorStop(1, '#2c2747'); } else { farGrad.addColorStop(0, '#a29bfe'); farGrad.addColorStop(1, '#dfe6e9'); }
        ctx.fillStyle = farGrad; ctx.beginPath(); ctx.moveTo(0, floorY);
        for (let x = 0; x <= canvas.width + 100; x += 100) { let worldX = x + farCam; let y = floorY - 200 + Math.sin(worldX * 0.0015) * 120 + Math.cos(worldX * 0.003) * 60; ctx.lineTo(x, y); }
        ctx.lineTo(canvas.width, floorY); ctx.fill();

        drawBeautifulClouds(0.1, 150, 0.6, isNight ? 0.4 : 0.6, isNight);

        let midCam = cameraX * 0.15; let midGrad = ctx.createLinearGradient(0, floorY - 200, 0, floorY);
        if (isNight) { midGrad.addColorStop(0, '#122c2a'); midGrad.addColorStop(1, '#0b1d1c'); } else { midGrad.addColorStop(0, '#55efc4'); midGrad.addColorStop(1, '#00b894'); }
        ctx.fillStyle = midGrad; ctx.beginPath(); ctx.moveTo(0, floorY);
        for (let x = 0; x <= canvas.width + 100; x += 60) { let worldX = x + midCam; let y = floorY - 80 + Math.sin(worldX * 0.003) * 70 + Math.sin(worldX * 0.008) * 25; ctx.lineTo(x, y); }
        ctx.lineTo(canvas.width, floorY); ctx.fill();

        drawBeautifulClouds(0.3, 100, 1.2, isNight ? 0.5 : 0.9, isNight);
        
        shootingStars.forEach((s, i) => {
            s.x += s.vx; s.y += s.vy; s.alpha -= 0.02;
            if (s.alpha <= 0) shootingStars.splice(i, 1);
            else {
                ctx.save(); ctx.globalAlpha = s.alpha; ctx.fillStyle = '#FFF';
                ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.vx*2, s.y - s.vy*2);
                ctx.strokeStyle = '#FFF'; ctx.stroke();
                ctx.restore();
            }
        });
    }

    function drawFloor() {

            else activeArray = translations[currentLang].endlessCutscene;

            let fullText = activeArray[cutsceneLineIndex]; let currentLineTime = performance.now() - lineStartTime; let totalCharsRequiredTime = 200 + fullText.length * 30; 

            if (currentLineTime < totalCharsRequiredTime) { lineStartTime = performance.now() - totalCharsRequiredTime; }

                    if (activeCutsceneType === 'intro') { startLevel(0); } else if (activeCutsceneType === 'shop') { hasSeenShopCutscene = true; saveProgress(); openShop(); } else if (activeCutsceneType === 'endless') { hasSeenEndlessCutscene = true; saveProgress(); goToMenu(); }
                }

        }

            if (!isEndlessMode && !hasSeenEndlessCutscene) {

            }

            showInterstitialAd(() => {
                startLevel(isEndlessMode ? 'endless' : currentLevelIndex);

        } 
    }

    function drawUI() {
        let levelStr = "";
        if (isEndlessMode) {
            levelStr = translations[currentLang].endlessTitle;
        } else {
            levelStr = `${translations[currentLang].level} ${currentLevelIndex + 1}`;
            // Добавляем /10 ко всем уровням, кроме финала
            if (currentLevelIndex < 10) {
                levelStr += '/10';
            }

        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.font = 'bold 26px "Segoe UI", sans-serif'; ctx.textAlign = 'left'; ctx.fillText(levelStr, 22, 42); 
        ctx.fillStyle = '#FFF'; ctx.fillText(levelStr, 20, 40); 

        if (isEndlessMode && (gameState === 'PLAYING' || gameState === 'DEATH_ANIMATION')) {
            let dist = Math.floor(Math.max(0, player.x / 50)); let distText = `${translations[currentLang].distance} ${dist}м`;
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.textAlign = 'center'; ctx.fillText(distText, canvas.width / 2 + 2, 42);
            ctx.fillStyle = '#f1c40f'; ctx.fillText(distText, canvas.width / 2, 40);
        }

        if (!isEndlessMode && currentLevelLength > 0 && (gameState === 'PLAYING' || gameState === 'WIN_ANIMATION' || gameState === 'DEATH_ANIMATION')) {

            let barWidth = window.innerWidth < 600 ? window.innerWidth * 0.5 : 300; let barHeight = 15; let barX = (canvas.width - barWidth) / 2; let barY = 20;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.beginPath(); ctx.roundRect(barX, barY, barWidth, barHeight, 8); ctx.fill();
            ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.roundRect(barX, barY, barWidth * progress, barHeight, 8); ctx.fill();
            ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(barX, barY, barWidth, barHeight, 8); ctx.stroke();
        }
    }

    function drawTrailParticles(dt) {
        for (let i = trailParticles.length - 1; i >= 0; i--) {
            let p = trailParticles[i]; p.alpha -= 0.03 * dt; p.size -= 0.3 * dt;
            if (p.alpha <= 0 || p.size <= 0) { trailParticles.splice(i, 1); } else { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color || '#f39c12'; ctx.beginPath(); ctx.arc(p.x - cameraX + shakeX, p.y + shakeY, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }
    }
    
    function updateAndDrawDeathParticles(dt) {
        let floorY = canvas.height - 50;
        for (let i = deathParticles.length - 1; i >= 0; i--) {
            let p = deathParticles[i]; p.x += p.vx * dt; p.vy += GRAVITY * dt; p.y += p.vy * dt; p.angle += p.vAngle * dt; p.alpha -= 0.015 * dt;

        if (!winBeamX) return; let drawX = winBeamX - cameraX + shakeX; let gradient = ctx.createLinearGradient(drawX - 40, 0, drawX + 40, 0); gradient.addColorStop(0, 'rgba(255, 255, 255, 0)'); gradient.addColorStop(0.5, 'rgba(255, 255, 200, 0.8)'); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); ctx.fillStyle = gradient; ctx.fillRect(drawX - 40, 0, 80, canvas.height - 50);

        else {
            ctx.save(); ctx.translate(shakeX, shakeY);
            
            drawBackground();

            if (gameState === 'PLAYING' || gameState === 'WIN_ANIMATION') {

            drawFloor();

            drawTrailParticles(dt);

                    ctx.fillStyle = 'rgba(241, 196, 15, 0.8)'; ctx.font = 'bold 20px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.fillText(translations[currentLang].best, recordX, floorY - 150); ctx.restore();

            currentLevelObjects.forEach(obj => {

                        let rightGrad = ctx.createLinearGradient(drawX + obj.w/2, objActualY, drawX + obj.w, objActualY + obj.h); rightGrad.addColorStop(0, '#ff7675'); rightGrad.addColorStop(1, '#922B21'); ctx.fillStyle = rightGrad; ctx.beginPath(); ctx.moveTo(drawX + obj.w / 2, objActualY); ctx.lineTo(drawX + obj.w / 2, objActualY + obj.h); ctx.lineTo(drawX + obj.w, objActualY + obj.h); ctx.fill();
                        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(drawX + obj.w / 2, objActualY); ctx.lineTo(drawX, objActualY + obj.h); ctx.lineTo(drawX + obj.w, objActualY + obj.h); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(drawX + obj.w / 2, objActualY); ctx.lineTo(drawX + obj.w / 2, objActualY + obj.h); ctx.stroke();

                        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.moveTo(drawX + obj.w, objActualY + obj.h); ctx.lineTo(drawX, objActualY + obj.h); ctx.lineTo(drawX + bev, objActualY + obj.h - bev); ctx.lineTo(drawX + obj.w - bev, objActualY + obj.h - bev); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.beginPath(); ctx.moveTo(drawX, objActualY + obj.h); ctx.lineTo(drawX, objActualY); ctx.lineTo(drawX + bev, objActualY + bev); ctx.lineTo(drawX + bev, objActualY + obj.h - bev); ctx.fill();
                        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.strokeRect(drawX + 10, objActualY + 10, obj.w - 20, obj.h - 20); ctx.fillStyle = '#1a252f'; ctx.fillRect(drawX + 4, objActualY + 4, 3, 3); ctx.fillRect(drawX + obj.w - 7, objActualY + 4, 3, 3); ctx.fillRect(drawX + 4, objActualY + obj.h - 7, 3, 3); ctx.fillRect(drawX + obj.w - 7, objActualY + obj.h - 7, 3, 3);
