<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{GAME_TITLE}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; outline: none; }
        body, html {
            width: 100%; height: 100%; position: fixed; overflow: hidden;
            background-color: {{BG_COLOR}}; display: flex; justify-content: center; align-items: center;
            font-family: {{FONT_FAMILY}}; color: white;
        }
        #game-container {
            position: relative; width: 100%; height: 100%; max-width: 400px;
            background-image: url('{{BG_IMAGE}}'); background-size: cover; background-position: center;
            box-shadow: {{SHADOW}}; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); }
        
        #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 5;}
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); z-index: 10; text-align: center;
        }
        .hidden { display: none !important; }
        
        h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 0 {{BLOCK_COLOR}}; }
        h2 { font-size: 24px; margin-bottom: 20px; color: #ffca28; }
        button {
            background: {{BLOCK_COLOR}}; color: white; border: 3px solid white; padding: 15px 30px;
            font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer; text-transform: uppercase;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Высота: <span id="score">0</span></div>
    
    <div id="menu" class="overlay">
        <h1>{{GAME_TITLE}}</h1>
        <button id="start-btn">Играть</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1>УПС!</h1>
        <h2 id="final-score">Счет: 0</h2>
        <button id="restart-btn">Еще разок!</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = canvas.parentElement.clientWidth;
    let height = canvas.height = canvas.parentElement.clientHeight;

    // --- ФИЗИКА И НАСТРОЙКИ ---
    const CONFIG = {
        gravity: 0.15,
        jumpForce: -8.5,
        accel: 0.25,
        maxSpeedX: 5,
        friction: 0.9,
        platWidth: 70,
        platHeight: 15,
        platGapMin: 50,
        platGapMax: 130
    };

    let state = {
        mode: 'MENU',
        score: 0,
        inputDirection: 0,
        platforms: [],
        touchStartX: null
    };

    const player = {
        x: width / 2, y: height - 150, lastY: height - 150,
        vx: 0, vy: 0, radius: 15,
        draw() {
            ctx.fillStyle = '{{BLOCK_COLOR}}';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Декоративный элемент (лицо/иконка)
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('{{LIFE_ICON}}', this.x, this.y);
        },
        update() {
            if (state.mode === 'FALLING') {
                this.vy += CONFIG.gravity; this.y += this.vy;
                if (this.y > height + 100) triggerGameOver();
                return;
            }

            this.lastY = this.y;

            // Движение по X
            if (state.inputDirection !== 0) {
                this.vx += state.inputDirection * CONFIG.accel;
                if (this.vx > CONFIG.maxSpeedX) this.vx = CONFIG.maxSpeedX;
                if (this.vx < -CONFIG.maxSpeedX) this.vx = -CONFIG.maxSpeedX;
            } else {
                this.vx *= CONFIG.friction;
            }
            this.x += this.vx;

            // Телепорт через края экрана
            if (this.x < -this.radius) this.x = width + this.radius;
            if (this.x > width + this.radius) this.x = -this.radius;

            // Гравитация
            this.vy += CONFIG.gravity;
            this.y += this.vy;

            // Скроллинг камеры вверх (двигаем всё вниз)
            if (this.y < height / 2) {
                const delta = (height / 2) - this.y;
                this.y = height / 2;
                state.score += delta;
                state.platforms.forEach(p => p.y += delta);
                document.getElementById('score').innerText = Math.floor(state.score / 10);
            }

            // Проигрыш при падении
            if (this.y > height + this.radius) {
                state.mode = 'FALLING';
                this.vy = -5; // Небольшой подскок перед падением
            }
        },
        jump() {
            this.vy = CONFIG.jumpForce;
        }
    };

    class Platform {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.w = CONFIG.platWidth;
            this.h = CONFIG.platHeight;
        }
        draw() {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.w, this.h, 5);
            ctx.fill();
        }
    }

    // --- ГЕНЕРАЦИЯ МИРА ---
    function spawnInitialWorld() {
        state.platforms = [];
        // Стартовая платформа точно под игроком
        state.platforms.push(new Platform(width / 2 - CONFIG.platWidth / 2, height - 40));
        let cy = height - 100;
        while (cy > 0) {
            spawnPlatform(cy);
            cy -= (Math.random() * (CONFIG.platGapMax - CONFIG.platGapMin) + CONFIG.platGapMin);
        }
    }

    function spawnPlatform(yLevel) {
        state.platforms.push(new Platform(Math.random() * (width - CONFIG.platWidth), yLevel));
    }

    function updateWorldMap() {
        // Удаляем старые платформы
        state.platforms = state.platforms.filter(p => p.y < height + 40);
        // Добавляем новые сверху
        let highestY = state.platforms.length > 0 ? Math.min(...state.platforms.map(p => p.y)) : height;
        while (highestY > 0) {
            let gap = Math.random() * (CONFIG.platGapMax - CONFIG.platGapMin) + CONFIG.platGapMin;
            spawnPlatform(highestY - gap);
            highestY = Math.min(...state.platforms.map(p => p.y));
        }
    }

    function resolveCollisions() {
        if (state.mode !== 'PLAYING') return;
        // Проверка коллизий ТОЛЬКО при падении вниз (vy > 0)
        if (player.vy > 0) {
            const playerBottom = player.y + player.radius;
            const playerPrevBottom = player.lastY + player.radius;
            
            for (let p of state.platforms) {
                if (player.x + player.radius > p.x && 
                    player.x - player.radius < p.x + p.w && 
                    playerBottom >= p.y && 
                    playerPrevBottom <= p.y + p.h) {
                    
                    player.y = p.y - player.radius;
                    player.jump();
                    break;
                }
            }
        }
    }

    // --- УПРАВЛЕНИЕ СТАТУСАМИ ---
    function startGame() {
        state.mode = 'PLAYING';
        state.score = 0;
        state.inputDirection = 0;
        player.x = width / 2;
        player.y = height - 150;
        player.vx = 0;
        player.vy = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        spawnInitialWorld();
        player.jump();
    }

    function triggerGameOver() {
        state.mode = 'GAMEOVER';
        document.getElementById('final-score').innerText = 'Счет: ' + Math.floor(state.score / 10);
        document.getElementById('game-over').classList.remove('hidden');
    }

    // --- СИСТЕМА ВВОДА ---
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);

    window.addEventListener('keydown', (e) => {
        if (state.mode === 'PLAYING') {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') state.inputDirection = -1;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') state.inputDirection = 1;
        }
    });
    window.addEventListener('keyup', (e) => {
        if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && state.inputDirection === -1) state.inputDirection = 0;
        if ((e.code === 'ArrowRight' || e.code === 'KeyD') && state.inputDirection === 1) state.inputDirection = 0;
    });

    // Touch управление (нажатие на левую/правую половину экрана)
    canvas.addEventListener('touchstart', (e) => {
        if (state.mode !== 'PLAYING') return;
        const touchX = e.touches[0].clientX;
        const rect = canvas.getBoundingClientRect();
        const xRel = touchX - rect.left;
        state.inputDirection = xRel < width / 2 ? -1 : 1;
    }, { passive: true });
    
    canvas.addEventListener('touchmove', (e) => {
        if (state.mode !== 'PLAYING') return;
        const touchX = e.touches[0].clientX;
        const rect = canvas.getBoundingClientRect();
        const xRel = touchX - rect.left;
        state.inputDirection = xRel < width / 2 ? -1 : 1;
    }, { passive: true });

    const stopTouch = () => { state.inputDirection = 0; };
    canvas.addEventListener('touchend', stopTouch);
    canvas.addEventListener('touchcancel', stopTouch);

    window.addEventListener('resize', () => {
        width = canvas.width = canvas.parentElement.clientWidth;
        height = canvas.height = canvas.parentElement.clientHeight;
    });

    // --- ИГРОВОЙ ЦИКЛ ---
    function gameLoop() {
        requestAnimationFrame(gameLoop);
        ctx.clearRect(0, 0, width, height);

        if (state.mode === 'PLAYING' || state.mode === 'FALLING') {
            player.update();
            updateWorldMap();
            resolveCollisions();
        }

        // Отрисовка
        state.platforms.forEach(p => p.draw());
        if (state.mode !== 'MENU') {
            player.draw();
        }
    }

    gameLoop();
</script>
</body>
</html>
